[General]
# Cronograma resumido:
# - 2025-11-11: Servicio inicial con prefijos MKP160/MKP161 apuntando a PC42t.
# - 2025-11-12: Renombrado de colas a MKP1/MKP2/MKP3 e igualación de driver Honeywell.
# - 2025-11-12 pm: Habilitado acceso web autenticado en CUPS (usuario cupsadmin).
# Rutas montadas que se desean vigilar (pueden listarse separadas por coma o saltos de línea)
WatchPaths = /mnt/mkp_print, /mnt/f_print
# WatchPath = /mnt/mkp_print  # Opción heredada si solo tienes una carpeta

# Subcarpetas relativas a cada WatchPath para archivar resultados
PrintedFolderName = impresos
ErrorFolderName = error

# Directorio local donde se guardarán los logs rotados por día
LogBaseDir = logs/listener

# Usa observador por sondeo (PollingObserver) útil en montajes SMB/CIFS
UsePollingObserver = true

# Plantilla del comando de impresión. {file} y {printer} se reemplazan dinámicamente.
# Ejemplo con CUPS: lp -d "IMPRESORA1" "/ruta/al/archivo.pdf"
PrinterCommandTemplate = lp -d "{printer}" -o media=Custom.65x55mm -o fit-to-page=true -o print-scaling=100 -o scaling=100 "{file}"


# Tiempo máximo (segundos) para que el comando de impresión finalice
PrintTimeoutSeconds = 8

# Cantidad de reintentos para esperar que un archivo deje de estar bloqueado
FileReadyRetries = 10
FileReadyDelayMs = 100

# Tiempo de espera tras recibir un evento antes de procesarlo (milisegundos)
EventDebounceMs = 100

[Printers]
# Formato: PREFIJO_ARCHIVO = COLA_REAL_CUPS
# - PREFIJO_ARCHIVO coincide con la parte antes del "_" en el nombre del PDF (ej: MKP1_ticket.pdf)
# - COLA_REAL_CUPS es la cola existente en CUPS donde se enviará el archivo.
MKP1 = MKP1
MKP2 = MKP2
MKP3 = MKP3
MKP4 = MKP4
F = FPRINT1
PICK1 = PICK1
PICK2 = PICK2
[PrinterCommands]
# Plantilla específica para la ticketera (ancho 80x3276 mm como en Windows).
FPRINT1 = lp -d "{printer}" -o media=Custom.80x3000mm -o page-top=0 -o page-bottom=0 -o fit-to-page=true -o print-scaling=100 "{file}"
